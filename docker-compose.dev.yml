

services:

  postgres:
    image: postgres:16-alpine
    container_name: bgrepresentacoes-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # postgres_test:
  #   image: postgres:16-alpine
  #   container_name: bgrepresentacoes-test-db
  #   restart: unless-stopped
  #   env_file:
  #     - .env
  #   ports:
  #     - '5433:5432'

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: bgrepresentacoes-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  pgdata: